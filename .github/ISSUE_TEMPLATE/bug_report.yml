name: Bug Report
description: Report a bug in Command Center
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Command Center
        2. Create an SSH session to ...
        3. Switch to Grid layout
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 26.4.9
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.4 Sequoia
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      placeholder: Paste any relevant terminal output, crash logs, or screenshots.
